[project]
name = "schema-engine"
version = "0.1.0"
description = "Canonical device report schema validation"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "devicepassport-shared",
]

[tool.uv.sources]
devicepassport-shared = { path = "../shared", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["schema_engine"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]
