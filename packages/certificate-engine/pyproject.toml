[project]
name = "certificate-engine"
version = "0.1.0"
description = "Certificate generation and management"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "schema-engine",
    "devicepassport-shared",
]

[tool.uv.sources]
schema-engine = { path = "../schema-engine", editable = true }
devicepassport-shared = { path = "../shared", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["certificate_engine"]
